version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../checkpoints:/app/checkpoints

  gradio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python app/gradio_app.py
    ports:
      - "7860:7860"
    env_file:
      - ../.env
    volumes:
      - ../checkpoints:/app/checkpoints
    depends_on:
      - api
